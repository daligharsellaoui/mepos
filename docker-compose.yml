# ======================================================
# mePOS STOCK — Full Production Stack
# ======================================================
# Usage:
#   Start:    docker compose up -d
#   Stop:     docker compose down
#   Rebuild:  docker compose build --no-cache
#   Logs:     docker compose logs -f
#
# Environment overrides:
#   docker compose --env-file .env.production up -d

services:
  # ======================================================
  # PostgreSQL Database
  # ======================================================
  db:
    image: postgres:15-alpine
    container_name: mepos_stock_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-mepos_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mepos_password}
      POSTGRES_DB: ${DB_NAME:-mepos_stock}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mepos_user} -d ${DB_NAME:-mepos_stock}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mepos_network

  # ======================================================
  # Backend API Server
  # ======================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mepos_stock_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DATABASE_URL: postgres://${DB_USER:-mepos_user}:${DB_PASSWORD:-mepos_password}@db:5432/${DB_NAME:-mepos_stock}
      API_KEY: ${API_KEY:-mepos_sec_key_prod_abc123}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_jwt_secret_key}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@mepos.app}
    ports:
      - "${API_PORT:-5000}:5000"
    volumes:
      - api_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - mepos_network

  # ======================================================
  # Frontend SPA (Nginx)
  # ======================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: mepos_stock_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - mepos_network

networks:
  mepos_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  api_logs:
    driver: local
